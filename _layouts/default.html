<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% if page.title %}
            {{ page.title }} | {{ site.title }}
        {% else %}
            {{ site.title }}
        {% endif %}
    </title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Temporary base styles */
        body { margin: 0; font-family: sans-serif; }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="wrapper">
            <a href="{{ '/' | relative_url }}" class="site-title">
                <i class="fas fa-newspaper"></i> {{ site.title }}
            </a>
            <nav class="site-nav">
                <a href="{{ '/' | relative_url }}">首页</a>
                <a href="{{ '/about' | relative_url }}">关于</a>
                <a href="https://github.com/{{ site.comments.utterances.repo }}" target="_blank">GitHub</a>
            </nav>
        </div>
    </header>

    <main class="page-content">
        <div class="wrapper">
            {{ content }}
        </div>
    </main>

    <footer class="site-footer">
        <div class="wrapper">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.author.name }}. All rights reserved.</p>
            <p>简报每日自动生成，内容仅供参考。</p>
        </div>
    </footer>

    <!-- Utterances comments -->
    {% if page.comments %}
        {% if site.comments.provider == "utterances" %}
            <script src="https://utteranc.es/client.js"
                repo="{{ site.comments.utterances.repo }}"
                issue-term="{{ site.comments.utterances.issue_term }}"
                theme="{{ site.comments.utterances.theme }}"
                crossorigin="anonymous"
                async>
            </script>
        {% endif %}
    {% endif %}
</body>
</html>
